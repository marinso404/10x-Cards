# Files in the config/locales directory are used for internationalization and
# are automatically loaded by Rails. If you want to use locales other than
# English, add the necessary files in this directory.
#
# To use the locales, use `I18n.t`:
#
#     I18n.t "hello"
#
# In views, this is aliased to just `t`:
#
#     <%= t("hello") %>
#
# To use a different locale, set it with `I18n.locale`:
#
#     I18n.locale = :es
#
# This would use the information in config/locales/es.yml.
#
# To learn more about the API, please read the Rails Internationalization guide
# at https://guides.rubyonrails.org/i18n.html.
#
# Be aware that YAML interprets the following case-insensitive strings as
# booleans: `true`, `false`, `on`, `off`, `yes`, `no`. Therefore, these strings
# must be quoted to be interpreted as strings. For example:
#
#     en:
#       "yes": yup
#       enabled: "ON"

en:
  hello: "Hello world"
  api:
    errors:
      unauthorized: "Authentication required"
      internal: "Internal server error"
      invalid_request: "Invalid request"
    generations:
      errors:
        source_text_length: "source_text must be between 1000 and 10000 characters"
        source_text_missing: "source_text is required"
        generation_failed: "Generation failed"
    flashcards:
      errors:
        empty: "At least one flashcard is required"
        validation_failed: "Flashcard validation failed"
  generations:
    new:
      title: "Generate Flashcards"
      source_text:
        label: "Source Text"
        placeholder: "Paste your source text here (1,000–10,000 characters)…"
        hint: "%{count} / %{max} characters"
        submit: "Generate Proposals"
        min_length_error: "Source text must be at least 1,000 characters"
        max_length_error: "Source text must be at most 10,000 characters"
      loader:
        label: "Generating flashcard proposals…"
      proposals:
        heading: "Flashcard Proposals"
        count: "%{selected} of %{total} selected"
        select_all: "Select all"
        deselect_all: "Deselect all"
        empty: "No proposals generated."
        edit: "Edit"
        reject: "Reject"
        save_edit: "Save"
        cancel_edit: "Cancel"
        front_label: "Front"
        back_label: "Back"
        front_error: "Front must be 1–200 characters"
        back_error: "Back must be 1–500 characters"
      bulk_actions:
        save_selected: "Save Selected"
        discard_all: "Discard All"
        saving: "Saving…"
        discarding: "Discarding…"
        no_selection: "Select at least one proposal to save"
      status:
        success: "Successfully saved %{count} flashcards!"
        generation_error: "Failed to generate proposals. Please try again."
        save_error: "Failed to save flashcards. Please try again."
        network_error: "Network error. Please check your connection and try again."
        duplicate: "This source text has already been used for a generation."
        discarded: "All proposals have been discarded."
